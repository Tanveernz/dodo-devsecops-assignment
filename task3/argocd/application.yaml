apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Tanveernz/dodo-devsecops-assignment.git
    targetRevision: main
    path: task1

  destination:
    server: https://kubernetes.default.svc
    namespace: payments

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
